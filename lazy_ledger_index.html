    <h1>懒人记账App</h1<p>欢迎使用本简易记账应用（以下简称“本应用”），本应用由个人开发者独立开发，深知用户隐私的重要性，特此制定本隐私政策，向您说明我们如何收集、使用、存储及保护您的信息。<h2>一、我们收集的</h2>
<p>1. 账号信息：为实现用户数据云同步功能，本应用仅收集您注册<strong</strong>，用于唯一识别您的用户账号，除此之外不收集任何姓名、手机号、身份证号等个人身份信息。</p>
    <p>2. 用户记账数据：您在应用内主动录入的记账信息，包括收支金额、交易时间、分类、备注等内容，仅用于您个人的多设备数据同步与本地</p>
<p>3. 设备与权限说明：<strong>不申请</strong>（包括相机、定位、存储、通讯录等），不采集设备标识、位置信息、上网记录等任何非必要数据。<h2>二、信息存储</h2><p>1. 您的电子邮箱账号及所有记账数据，均通过加密协议传输，并存储于境外云数据库服务（Firebase/Supabase），数据传输与存储全程加密，保障数据安全。</p>
    <p>2. 您的所有数据仅用于个人记账功能使用，不会用于任何商业推广、数据分析等</p><h2>三、信息共享与披露</h2>
   <p>1. 本应用不会向任何第三方共享、出售、转让、泄露您的账号信息、记账数据及其他个人相关</p>
<p>2. 仅在法律法规要求、政府部门合法调查，或为保护本应用及其他用户合法权益的情况下，才会依法披露相关信息</p>

   <h2>四、</h2><p>1. 您可随时在应用内查看、修改、删除自己的记账数据，也可随时申请注销账号，账号注销后，您的所有相关数据将永久清除，无法恢复。</p>
    <p>2. 若您对自身数据有查询、导出、删除等需求，可通过下方联系方式联系开发者</p>

<h2>五</h2>
    <p>我们采用行业标准的加密技术、安全协议对您的数据进行保护，采取合理的安全防护措施防止数据丢失、滥用、未经授权访问或泄露。但需说明，互联网传输及电子存储方式无法做到绝对安全，我们会尽最大努力保障数据安全。</p>

    <h2>六、政策</h2>
<p>本隐私政策若因功能更新、法规调整等原因发生变更，将通过应用内公告形式告知用户，变更后的政策自公告之日起生效</p>
